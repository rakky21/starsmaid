<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Stars Maid Logo - Icon Only (for favicon/small use) -->
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2"/>
  
  <!-- Blue Stars -->
  <!-- Top Left Blue Star -->
  <path d="M 25 20 L 29 30 L 40 30 L 31 37 L 35 47 L 25 40 L 15 47 L 19 37 L 10 30 L 21 30 Z" fill="#0EA5E9"/>
  
  <!-- Top Right Yellow Star -->
  <path d="M 70 15 L 73 24 L 83 24 L 75 30 L 78 39 L 70 33 L 62 39 L 65 30 L 57 24 L 67 24 Z" fill="#FBBF24"/>
  
  <!-- Bottom White Star -->
  <path d="M 35 70 L 39 80 L 50 80 L 41 86 L 45 96 L 35 90 L 25 96 L 29 86 L 20 80 L 31 80 Z" fill="#F8FAFC"/>
  
  <!-- Woman Cleaner (Teal/Blue) -->
  <g id="woman-cleaner">
    <circle cx="40" cy="52" r="5" fill="#06B6D4"/>
    <circle cx="40" cy="40" r="6" fill="#06B6D4"/>
    <!-- Broom -->
    <line x1="44" y1="48" x2="52" y2="44" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
    <circle cx="54" cy="42" r="2" fill="#06B6D4"/>
  </g>
  
  <!-- Man Handyman (Navy) -->
  <g id="man-handyman">
    <circle cx="62" cy="52" r="5" fill="#1E3A8A"/>
    <circle cx="62" cy="40" r="6" fill="#1E3A8A"/>
    <!-- Wrench -->
    <line x1="58" y1="48" x2="50" y2="56" stroke="#1E3A8A" stroke-width="2" stroke-linecap="round"/>
    <circle cx="48" cy="58" r="2" fill="#1E3A8A"/>
  </g>
  
  <!-- "SM" Monogram -->
  <text x="50" y="75" font-family="'DM Serif Display', serif" font-size="18" font-weight="900" fill="#1E3A8A" text-anchor="middle">
    SM
  </text>
</svg>
