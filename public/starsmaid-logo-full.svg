<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Starsmaid Logo - Full Horizontal Version -->
  
  <!-- Blue Stars Background (3 stars) -->
  <g id="stars-background">
    <!-- Top Left Blue Star (large) -->
    <path d="M 35 15 L 40 28 L 54 28 L 43 37 L 48 50 L 35 42 L 22 50 L 27 37 L 16 28 L 30 28 Z" fill="#0EA5E9" opacity="0.8"/>
    
    <!-- Top Right Yellow Star (small) -->
    <path d="M 75 8 L 78 16 L 86 16 L 79 21 L 82 29 L 75 24 L 68 29 L 71 21 L 64 16 L 72 16 Z" fill="#FBBF24" opacity="0.9"/>
    
    <!-- Bottom White Star (medium) -->
    <path d="M 20 65 L 25 78 L 39 78 L 28 86 L 33 99 L 20 91 L 7 99 L 12 86 L 1 78 L 15 78 Z" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <!-- Main Icon Container (simplified icons) -->
  <g id="team-icons">
    <!-- Woman Cleaner (Teal) -->
    <circle cx="45" cy="65" r="6" fill="#06B6D4"/>
    <circle cx="45" cy="50" r="7" fill="#06B6D4"/>
    <!-- Arms with broom -->
    <line x1="38" y1="58" x2="32" y2="55" stroke="#06B6D4" stroke-width="1.5"/>
    <line x1="52" y1="58" x2="58" y2="62" stroke="#06B6D4" stroke-width="1.5"/>
    <!-- Broom bristles -->
    <circle cx="60" cy="65" r="2" fill="#06B6D4"/>
    <circle cx="62" cy="67" r="1.5" fill="#06B6D4"/>
    
    <!-- Man Handyman (Navy) -->
    <circle cx="60" cy="65" r="6" fill="#1E3A8A"/>
    <circle cx="60" cy="50" r="7" fill="#1E3A8A"/>
    <!-- Arms with wrench -->
    <line x1="53" y1="58" x2="47" y2="55" stroke="#1E3A8A" stroke-width="1.5"/>
    <line x1="67" y1="58" x2="73" y2="62" stroke="#1E3A8A" stroke-width="1.5"/>
    <!-- Wrench -->
    <path d="M 72 60 L 80 68" stroke="#1E3A8A" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text Logo -->
  <g id="text">
    <!-- "Stars Maid" text -->
    <text x="115" y="55" font-family="'DM Serif Display', serif" font-size="42" font-weight="900" fill="#1E3A8A">
      Stars
    </text>
    <text x="115" y="95" font-family="'DM Serif Display', serif" font-size="42" font-weight="900" fill="#06B6D4">
      Maid
    </text>
    
    <!-- Tagline -->
    <text x="115" y="110" font-family="'DM Sans', sans-serif" font-size="10" fill="#64748b" letter-spacing="1">
      Cleaning + Handyman
    </text>
  </g>
</svg>
