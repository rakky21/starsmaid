<svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Stars Maid Logo - Professional Horizontal Version -->
  
  <!-- Premium Icon Mark -->
  <g id="icon-mark">
    <!-- Background Circle -->
    <circle cx="80" cy="80" r="75" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    
    <!-- Decorative Stars -->
    <!-- Large Blue Star (top-left) -->
    <path d="M 40 25 L 46 45 L 68 45 L 50 58 L 56 78 L 40 65 L 24 78 L 30 58 L 12 45 L 34 45 Z" fill="#0EA5E9" opacity="0.85"/>
    
    <!-- Yellow Accent Star (top-right) -->
    <path d="M 115 20 L 120 35 L 137 35 L 124 44 L 129 59 L 115 50 L 101 59 L 106 44 L 93 35 L 110 35 Z" fill="#FBBF24" opacity="0.9"/>
    
    <!-- White Star (bottom) -->
    <path d="M 60 110 L 65 125 L 82 125 L 68 134 L 73 149 L 60 140 L 47 149 L 52 134 L 38 125 L 55 125 Z" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Team Figures -->
    <!-- Woman Cleaner (Teal) with Broom -->
    <g id="woman">
      <ellipse cx="55" cy="70" rx="8" ry="12" fill="#06B6D4"/>
      <circle cx="55" cy="50" r="9" fill="#06B6D4"/>
      <!-- Arms -->
      <line x1="48" y1="65" x2="35" y2="58" stroke="#06B6D4" stroke-width="2.5"/>
      <line x1="62" y1="68" x2="78" y2="75" stroke="#06B6D4" stroke-width="2.5"/>
      <!-- Broom -->
      <line x1="78" y1="75" x2="92" y2="85" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
      <circle cx="94" cy="87" r="3" fill="#06B6D4"/>
      <circle cx="97" cy="89" r="2" fill="#06B6D4"/>
    </g>
    
    <!-- Man Handyman (Navy) with Wrench -->
    <g id="man">
      <ellipse cx="105" cy="70" rx="8" ry="12" fill="#1E3A8A"/>
      <circle cx="105" cy="50" r="9" fill="#1E3A8A"/>
      <!-- Arms -->
      <line x1="98" y1="65" x2="82" y2="55" stroke="#1E3A8A" stroke-width="2.5"/>
      <line x1="112" y1="68" x2="128" y2="78" stroke="#1E3A8A" stroke-width="2.5"/>
      <!-- Wrench -->
      <line x1="127" y1="77" x2="142" y2="92" stroke="#1E3A8A" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="144" cy="94" r="3" fill="#1E3A8A"/>
    </g>
  </g>
  
  <!-- Text Logo -->
  <g id="text-logo">
    <!-- Primary Text -->
    <text x="190" y="85" font-family="'DM Serif Display', serif" font-size="56" font-weight="900" fill="#1E3A8A" letter-spacing="-1">
      STARS
    </text>
    <text x="190" y="130" font-family="'DM Serif Display', serif" font-size="56" font-weight="900" fill="#06B6D4" letter-spacing="-1">
      MAID
    </text>
    
    <!-- Subtitle -->
    <text x="190" y="148" font-family="'DM Sans', sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.5" text-transform="uppercase">
      Cleaning • Handyman Services
    </text>
  </g>
</svg>
